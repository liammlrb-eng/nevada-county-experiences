[pytest]
# Pytest configuration for the smoke-test suite.
#
# `testpaths` keeps pytest from scanning the whole repo (the scraper
# folder has plenty of Python that isn't tests). `addopts` requests
# concise output + colored diffs. The `--browser chromium` arg pins us
# to chromium so the CI install step only needs to fetch one browser.
testpaths = tests
# `-m "not visual"` keeps the opt-in visual-regression suite OUT of the
# default run (and out of CI, which just calls `pytest`). Visual snapshots
# are inherently OS/font/image-dependent and would flake across machines —
# run them deliberately with `pytest -m visual` on the same OS that owns the
# committed baselines. A command-line `-m ...` overrides this default.
addopts =
    -ra
    --tb=short
    --strict-markers
    --browser chromium
    -m "not visual"
markers =
    smoke: quick checks that should always pass; gate on PRs
    combo: vibe×pill state-combination sweep; fast, deterministic, runs in CI
    visual: visual-regression snapshots; opt-in, run locally on the baseline OS
