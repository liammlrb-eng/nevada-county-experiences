[pytest]
# Pytest configuration for the smoke-test suite.
#
# `testpaths` keeps pytest from scanning the whole repo (the scraper
# folder has plenty of Python that isn't tests). `addopts` requests
# concise output + colored diffs. The `--browser chromium` arg pins us
# to chromium so the CI install step only needs to fetch one browser.
testpaths = tests
addopts =
    -ra
    --tb=short
    --strict-markers
    --browser chromium
markers =
    smoke: quick checks that should always pass; gate on PRs
