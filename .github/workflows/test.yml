name: Smoke tests

# Runs the Playwright smoke suite on every push + PR to main. Goal: any
# commit that breaks the homepage gets flagged within ~2 minutes. Build
# fails if any smoke check fails or any uncaught JS error fires during
# the page-load test.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual runs from the Actions tab too — useful for re-running
  # after fixing a flaky environment issue.
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run smoke tests
        run: pytest -v

      # Save Playwright traces / screenshots on failure so we can see
      # *what* broke without re-running locally.
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-failure-artifacts
          path: |
            test-results/
            **/playwright-report/
          if-no-files-found: ignore
          retention-days: 7
